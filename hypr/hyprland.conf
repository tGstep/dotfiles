################
### MONITORS ###
################


monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################


$terminal = ghostty
$browser = firefox
$menu = wofi --show drun
$editor = /home/giulio/opt/zed --ozone-platform=wayland --unity-launch %F

#################
### AUTOSTART ###
#################


exec-once = waybar &
exec-once = nm-applet --indicator
exec-once = hyprpaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent
exec-once = pass-secret-service &

#############################
### ENVIRONMENT VARIABLES ###
#############################


env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

env = MOZ_ENABLE_WAYLAND, 1


###################
### KEYBINDINGS ###
###################


$mainMod = SUPER


# Essential binds
bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, C, exec, $editor

bind = $mainMod, Q, killactive,
bind = $mainMod, ESCAPE, exit,
bind = $mainMod, F, fullscreen,

# Allow resizing portal dialog
bind = ALT, RIGHT, resizeactive, 20 0
bind = ALT, LEFT, resizeactive, -20 0
bind = ALT, DOWN, resizeactive, 0 20
bind = ALT, UP, resizeactive, 0 -20

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Toggle split orientation
bind = $mainMod, J, togglesplit

# Screenshot binding
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy


# Volume controls
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness controls
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous



#####################
### LOOK AND FEEL ###
#####################


general {
    gaps_in = 3
    gaps_out = 12

    border_size = 1

    # Colori più soft e pastello
    col.active_border = rgba(88ccffaa) rgba(99eeddaa) 45deg
    col.inactive_border = rgba(44444466)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    
    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000044)
        offset = 0 2
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.2
        brightness = 1.0
        noise = 0.02
    }
}


animations {
    enabled = yes

    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = easeInOut, 0.42, 0, 0.58, 1
    bezier = softOut, 0.25, 0.46, 0.45, 0.94
    bezier = comfortable, 0.33, 0.85, 0.56, 1

    animation = global, 1, 8, comfortable
    animation = border, 1, 8, easeOut
    animation = borderangle, 1, 100, comfortable, loop
    
    animation = windows, 1, 6, comfortable, slide
    animation = windowsIn, 1, 5, softOut, popin 90%
    animation = windowsOut, 1, 4, easeInOut, popin 90%
    
    animation = fadeIn, 1, 4, easeOut
    animation = fadeOut, 1, 3, easeInOut
    animation = fade, 1, 5, comfortable
    
    animation = layers, 1, 5, softOut
    animation = layersIn, 1, 4, easeOut, slide
    animation = layersOut, 1, 3, easeInOut, slide
    animation = fadeLayersIn, 1, 3, easeOut
    animation = fadeLayersOut, 1, 2, easeInOut
    
    animation = workspaces, 1, 5, comfortable, slide
    animation = workspacesIn, 1, 4, softOut, slidefade
    animation = workspacesOut, 1, 4, easeInOut, slidefade
}



# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}


# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = it
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# Hyprland 0.51+ gestures: right to next (n+1), left to previous (n-1), cycles within existing workspaces
gestures {
   gesture = 3, horizontal, workspace
}
