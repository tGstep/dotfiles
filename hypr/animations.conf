animations {
    enabled = true

    bezier = cozy,       0.16, 1,   0.3, 1
    bezier = warmSettle, 0.25, 0.9, 0.25, 1
    bezier = smoothFade, 0.4,  0.0, 0.2,  1

    animation = windowsIn,   1, 5, cozy,       popin 85%
    animation = windowsOut,  1, 4, warmSettle,  popin 85%
    animation = windowsMove, 1, 5, warmSettle

    animation = workspaces,       1, 6, cozy, slidefade 20%
    animation = specialWorkspace, 1, 5, cozy, slidefade 15%

    animation = fade,       1, 5, smoothFade
    animation = fadeIn,     1, 5, smoothFade
    animation = fadeOut,    1, 4, smoothFade
    animation = fadeDim,    1, 5, smoothFade
    animation = fadeSwitch, 1, 5, smoothFade

    animation = layersIn,  1, 4, cozy,      fade
    animation = layersOut, 1, 3, warmSettle, fade
}
