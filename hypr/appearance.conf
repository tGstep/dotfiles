general {
    gaps_in = 6
    gaps_out = 18

    border_size = 2

    # Soft muted gradient — swap colors to match your palette
    col.active_border = rgba(cba6f7cc) rgba(89dcebcc) 45deg
    col.inactive_border = rgba(313244aa)

    resize_on_border = true   # handy with soft gaps
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 16             # rounder = softer feel
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.92   # subtle dim on unfocused windows for depth

    shadow {
        enabled = true
        range = 20            # wider spread
        render_power = 2      # softer falloff
        color = rgba(00000044) # neutral dark, barely visible
    }

    blur {
        enabled = true
        size = 8              # larger = dreamier frosted glass
        passes = 3            # more passes = smoother blur
        noise = 0.02
        contrast = 0.9
        vibrancy = 0.2
        vibrancy_darkness = 0.5
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}
